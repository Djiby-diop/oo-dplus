name: oo-dplus CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Cargo build + test (std)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check (no_std default)
        run: cargo check

      - name: cargo build (std features — dplus tools)
        run: cargo build --features std --bins

      - name: cargo test (std)
        run: cargo test --features std

      - name: Verify dplus_check binary
        run: cargo run --features std --bin dplus_check -- --help || true

      - name: Verify dplus_judge binary
        run: cargo run --features std --bin dplus_judge -- --help || true
